<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>Add Student Answer Paper Pages</span>
                </div>
            </div>
        </div>
        <form name="addaddevaluatorform" [formGroup]="answerpaperpages"  novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                        <div fxLayout="row wrap " fxFlex="100">

                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                    <mat-select placeholder="Answer Paper" name="AnswerPaper" formControlName="AnswerPaper" required>
                        <mat-option  [value]="0">AnswerPaper-1</mat-option>
                        <mat-option  [value]="1">AnswerPaper-2</mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                    <input matInput placeholder="Page No" name="Page No" formControlName="PageNo" required>
                </mat-form-field>

                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="34" fxFlex.gt-md="34">
                    <input matInput placeholder="Answer Paper Page" name="Paper Page" formControlName="AnswerPaperPage" required>
                </mat-form-field>
                      <!-- <input type="file" (change)="upload($event)" placeholder="Upload file" accept=".xlsx" #uploadXl>
                      <button mat-raised-button class="add-btn" color="accent" (click)="uploadFile()">Upload</button> -->
                      <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                        <input matInput placeholder="Page Path" name="Page Path" formControlName="PagePath" required>
                    </mat-form-field>
                    
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="15" fxFlex.gt-md="15">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="46" fxFlex.gt-md="46" *ngIf="answerpaperpages.controls.isActive.value === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                    </div>
               </div>
               </div>
            </mat-dialog-content>

                <mat-dialog-actions>
                    <button mat-raised-button class="cls-btn" mat-dialog-close>
                              Close
                              </button>
                    <button mat-raised-button class="add-btn" color="accent" >
                   Save
                   </button>
    
                </mat-dialog-actions>

</form>
        </div>
        </div>
