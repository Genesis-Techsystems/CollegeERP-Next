<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span> Publish Question Paper On</span>
                </div>
            </div>
        </div>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                            <form name="evaluatorForm" [formGroup]="evaluatorForm"  novalidate>
                                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50"  disabled>
                                    <input matInput type="date" placeholder="" name="examDate" disabled  formControlName="examDate" >
                                </mat-form-field>
                                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50"  disabled>
                                    <input matInput type="text" placeholder="" name="examTime" disabled  formControlName="examTime" >
                                </mat-form-field>
                                <!-- <div fxLayout="column"  class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" >
                                    <label style="margin-bottom: -19px;color: #989898;" >Start Time</label>
                                    <w-mat-timepicker  formControlName="examTime" [disabled]="true" color="primary" [(userTime)]="meetingFromTime"></w-mat-timepicker>
                                    </div> -->
                     
                        </form>
                       
                    </div>
                  
                </div>
            </mat-dialog-content>
            <mat-dialog-actions class="popup-btn">
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                    Ok
                    </button>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                    Cancel
           </button>
            
            </mat-dialog-actions>
    </div>
  </div>
