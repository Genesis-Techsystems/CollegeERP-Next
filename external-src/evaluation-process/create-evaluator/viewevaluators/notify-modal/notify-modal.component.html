


<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span> Send Credentials</span>
                </div>
            </div>
        </div>
        <form name="addaddevaluatorform" [formGroup]="addevaluatorform" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20"
                                    fxFlex.gt-md="20">
                                    <mat-select placeholder="Course" name="courseId" formControlName="courseId"
                                        (selectionChange)="selectedCourse(addevaluatorform.value.courseId)" required>
                                        <mat-option *ngFor="let course of courses" matTooltip="{{course.course_code}}"
                                            [value]="course.fk_course_id">{{course.course_code}}</mat-option>
                                    </mat-select>
                                </mat-form-field>
                                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20"
                                    fxFlex.gt-md="20">
                                    <mat-select placeholder="Academic Year" name="academicYearId"
                                        formControlName="academicYearId"
                                        (selectionChange)="selectedAcademicYear(addevaluatorform.value.academicYearId)"
                                        required>
                                        <mat-option *ngFor="let obcjt of academicYears"
                                            matTooltip="{{obcjt.academic_year}}"
                                            [value]="obcjt.fk_academic_year_id">{{obcjt.academic_year}}</mat-option>
                                    </mat-select>
                                </mat-form-field>
                                <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="60"
                                    fxFlex.gt-md="60">
                                    <mat-select placeholder="Exam " name="examId" formControlName="examId" required>
                                        <ngx-mat-select-search [placeholderLabel]="'Search...'"
                                            [noEntriesFoundLabel]="'no matching data found'"
                                            (keyup)="searchexam($event.target.value)"></ngx-mat-select-search>
                                        <mat-option *ngFor="let exam of examData" [value]="exam.fk_exam_id"
                                            matTooltip="{{exam.exam_name}} ({{exam.from_date | date:dateFormate}} - {{exam.to_date | date:dateFormate}})">
                                            {{exam.exam_name}} ({{exam.from_date | date:dateFormate}} - {{exam.to_date |
                                            date:dateFormate}})
                                            <span *ngIf="exam.is_internal_exam" style="color: #0014ff;font-weight: 500;"
                                                matTooltip='Internal'>(Internal)</span>
                                            <span *ngIf="exam.is_regular_exam" style="color: #0014ff;font-weight: 500;"
                                                matTooltip="Regular">(Regular)</span>
                                            <span *ngIf="exam.is_supply_exam" style="color: #0014ff;font-weight: 500;"
                                                matTooltip="Supple">(Supple)</span>
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            <p>Send Credentials to <span *ngIf="data.condition == 'single' ">{{evauatorSingleData?.evaluatorName}}</span> <span *ngIf="this.data.condition == 'bulk' ">All Evaluators</span></p>
                    </div>
                  
                </div>
            </mat-dialog-content>
            <mat-dialog-actions class="popup-btn">
                <button mat-raised-button class="add-btn" color="accent" (click)="onSave()">
                    Send
                    </button>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                    Cancel
           </button>
            </mat-dialog-actions>
        </form>
    </div>
  </div>
