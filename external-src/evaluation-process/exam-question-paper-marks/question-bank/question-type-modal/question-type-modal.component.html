<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span> {{dialogTitle}}  </span>
                </div>
            </div>
        </div>

<form name="newForm"  [formGroup]="newForm" >
    <mat-dialog-content>
    <div fxLayout="column" style="margin-top: 10px;">
        <div fxLayout="row wrap " fxFlex="100">
            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                <mat-select placeholder="Difficulty Level" name="questionDifficultyCatDetId" formControlName="questionDifficultyCatDetId"  required>
                    <mat-option *ngFor="let obj of questiondifficultysList" [value]="obj.generalDetailId">{{obj.generalDetailDisplayName}}</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                <mat-select placeholder="Taxonomy Level" name="taxonomyLevelCatDetId" formControlName="taxonomyLevelCatDetId"  required>
                    <mat-option *ngFor="let obj of questionTaxonomyLevelList" [value]="obj.generalDetailId">{{obj.generalDetailDisplayName}}</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-raised-button class="cls-btn" mat-dialog-close>
              Close
              </button>
    <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
   Save
   </button>

</mat-dialog-actions>
</form>
</div>
</div>
