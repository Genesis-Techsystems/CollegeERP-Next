<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                        layers
                        </i>
                <!-- <mat-icon>calendar_view_day</mat-icon> -->
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="gradeRuleSettingForm" [formGroup]="gradeRuleSettingForm" novalidate>
        <mat-dialog-content>
                <div fxLayout="column" class="mlr-15 inner-bkgrd div-border" style="margin-top: 10px;padding: 5px !important;">

                        <div fxLayout="row wrap " fxFlex="100">
                            <!-- <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="12" fxFlex.gt-md="12" *ngIf="!isEmptyObject(data)">
                                <p class="details-off">{{data.collegeCode}} / {{data.courseCode}}</p>
                            </div> -->
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                <p class="details-off"><span class="rol-no"> {{data.collegeCode}} / {{data.courseCode}} </span></p>
                            </div>
                        </div>
                        
                            </div>
            <div fxLayout="column">
                
                <div fxLayout="row wrap " fxFlex="100">

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput  type="number" placeholder="Mod 1 Marks" name="Mod 1 Pass Percentage" formControlName="firstmodmarkstobeAdded" >
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput  type="number" placeholder="Mod 1 Pass Percentage" name="gradeCode" formControlName="firstmodpassPercentage" >
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Mod 2 Marks" name="secmod_markstobeadded" formControlName="secmodmarkstobeAdded">
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Mod 2 Pass Percentage" name="minPoints" formControlName="secmodmarksPercentage">
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Mod 2 Student Percentage" name="maxPoints" formControlName="secmodstdPercentage">
                    </mat-form-field>
                 
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Grafting Percentage" name="grafting_percentage" formControlName="graftingPercentage">
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Evaluation GraceMarks" name="evaluationGraceMarks" formControlName="evaluationGraceMarks">
                    </mat-form-field>
                 
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Moderation GraceMarks" name="moderationGraceMarks" formControlName="moderationGraceMarks">
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <input matInput [matDatepicker]="fDate" placeholder="From Date" name="fromDate"  [min]="minDate"   (dateChange)="calDay()" formControlName="fromDate">
                        <mat-datepicker-toggle matSuffix [for]="fDate"></mat-datepicker-toggle>
                        <mat-datepicker #fDate></mat-datepicker>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <input matInput [matDatepicker]="tDate" placeholder="To Date" [min]="gradeRuleSettingForm.value.fromDate"  (dateChange)="calDay()" name="toDate" formControlName="toDate">
                        <mat-datepicker-toggle matSuffix [for]="tDate"></mat-datepicker-toggle>
                        <mat-datepicker #tDate></mat-datepicker>
                    </mat-form-field>
                </div>
                <div fxLayout="row wrap " fxFlex="100" style="margin-top: 15px">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="gradeRuleSettingForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>

            <button mat-raised-button class="cls-btn" mat-dialog-close>
        Close
    </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
        Save
    </button>
        </mat-dialog-actions>
    </form>
</div>
