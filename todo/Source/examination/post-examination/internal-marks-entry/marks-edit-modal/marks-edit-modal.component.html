<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>  {{dialogTitle}}</span>
                </div>
            </div>
        </div>
        <form name="marksForm" [formGroup]="marksForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column" class="div-border">
                          <div fxLayout="row wrap " fxFlex="100">
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                  <p class="details-off">College : </p>
                              </div>
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                  <p class="details-off"><span class="colr"> {{data.collegeName}} </span></p>
                              </div>
                          </div>
                          <div fxLayout="row wrap " fxFlex="100">
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                  <p class="details-off">Student : </p>
                              </div>
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                  <p class="details-off"><span class="colr"> {{data.firstName}} ({{data.rollNumber}}) </span></p>
                              </div>
                          </div>
                          <div fxLayout="row wrap " fxFlex="100">
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                  <p class="details-off">Subject : </p>
                              </div>
                              <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                  <p class="details-off"><span class="colr"> {{data.subjectName}} ({{data.subjectCode}}) </span></p>
                              </div>
                          </div>
                          <div fxLayout="row wrap " fxFlex="100">
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                <p class="details-off">Subject Type : </p>
                            </div>
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                <p class="details-off"><span class="colr"> {{data.subjecttypeCode}} </span></p>
                            </div>
                          </div>
                           <div fxLayout="row wrap " fxFlex="100">
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                <p class="details-off">Marks : </p>
                            </div>
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                <p class="details-off"><span class="colr"> {{data.marks}} </span></p>
                            </div>
                          </div>
                      </div>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                        <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="18" fxFlex.gt-md="18" appearance="outline" [floatLabel]="'never'">
                            <input matInput placeholder="Marks" name="marks" formControlName="marks">
                        </mat-form-field> -->
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100">
                            <textarea matInput placeholder="Reason" name="marksComments" formControlName="marksComments"></textarea>
                        </mat-form-field>
                    </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
               Save
               </button>

            </mat-dialog-actions>
        </form>
    </div>
</div>
