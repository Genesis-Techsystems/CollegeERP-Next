
<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span> Modify Student Batches</span>
                </div>
            </div>
        </div>
          
            <mat-dialog-content>
                <div fxLayout="column">
                    <h3 style="color:rgb(0, 0, 0);font-weight:700;padding:0px 11px;background: #C3D9FF; text-align: left;padding: 5px 5px !important; margin: 0px; ">{{this.item.student_name}}({{this.item.hallticket_number}}) - {{this.item.labbatch_name}} </h3>

                    <div fxLayout="row wrap " fxFlex="100">
                        <!-- <div>
                            <h4 style="color:rgb(155, 155, 229)">
                             Secure Code
                            </h4>
                            </div> -->
                            <form name="evaluatorForm" [formGroup]="evaluatorForm" style="width: -webkit-fill-available;"  novalidate>
                                <mat-form-field appearance="outline" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">
                                    <mat-select placeholder="Select Batches" name="eaxmLabBatchId" formControlName="eaxmLabBatchId"  required>
                                        <mat-option *ngFor="let obj of batches" [value]="obj.eaxmLabBatchId">{{obj.batchName}}</mat-option>
                                    </mat-select>
                                </mat-form-field>
                        </form>
                       
                    </div>
                  
                </div>
            </mat-dialog-content>
            <mat-dialog-actions class="popup-btn">
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                    Save
                    </button>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                    Cancel
           </button>
            
            </mat-dialog-actions>
    </div>
  </div>
