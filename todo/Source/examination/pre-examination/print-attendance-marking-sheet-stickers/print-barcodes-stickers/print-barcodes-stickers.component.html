<div class="layout"  >
    <div fxLayout="row" >
       <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">
        <table>  
           <tr>
              <td *ngFor="let data of data" style="margin:auto; float:left; width:25%; border: none !important; vertical-align: middle !important; padding: 25px 0px 9px 0px !important;" >
                  <span style="display: flex; justify-content: center; margin-bottom: -3px; font-size: 12px !important;"> {{data?.hallticket_number}}</span>
                  <img [src]="'data:image/jpg;base64,'+data?.omr_barcode" style="height:30px; width: 192px !important; vertical-align: middle !important;" /> 
                  <span style="display: flex; justify-content: center; font-size:8px; margin-top: 1px;"> {{data?.exam_date}}&nbsp;({{data?.exam_session_name}}) &nbsp; &nbsp; {{data?.subject_code}}</span>
              </td>
           </tr>
        </table>
       </div>
    </div>
    <div class="printbtn">
       <button  id="printPageButton" mat-raised-button class="back-btn" (click)="printBack()">
         Back</button>
         <button  id="printPageButton" mat-raised-button color="accent" (click)="printPage('printsection')">
             Print</button>
     </div>
  </div>
