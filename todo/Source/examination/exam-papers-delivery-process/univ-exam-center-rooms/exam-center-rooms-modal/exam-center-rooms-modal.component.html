<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>Update Exam Answer Paper</span>
                </div>
            </div>
        </div>
        <form name="staffForm" [formGroup]="staffForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column" class="div-border" >
                <div fxLayout="row wrap " fxFlex="100">
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                        <p class="details-off">center Name : </p>
                    </div>
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                        <p class="details-off"><span class="colr"> {{data?.examCenterName}}</span></p>
                    </div>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                        <p class="details-off">Building Name : </p>
                    </div>
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                        <p class="details-off"><span class="colr"> {{data?.buildingName}}</span></p>
                    </div>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                        <p class="details-off">Room Name : </p>
                    </div>
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                        <p class="details-off"><span class="colr"> {{data?.roomName}}</span></p>
                    </div>
                </div>
            </div>
            <div fxLayout="column">
                <div fxLayout="row wrap " fxFlex="100">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="15">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="staffForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>

                    </div>
                    </div>

           
        </mat-dialog-content>
        </form>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close>
                  Close
              </button>
              <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                  Save
                  </button>
        </mat-dialog-actions>
  
    </div>
  </div>
