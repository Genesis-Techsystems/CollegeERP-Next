<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                        layers
                        </i>
                <span> {{dialogTitle}} &nbsp;-&nbsp;{{data.universityCode}} </span>
            </div>
        </div>
    </div>
    <form name="examGroupModalForm" [formGroup]="examGroupModalForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column">
                
                <div fxLayout="row wrap " fxFlex="100">
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <mat-select placeholder="Academic Year" name="academicYearId" formControlName="academicYearId" required>
                            <mat-option *ngFor="let academicYear of academicYears" [value]="academicYear.academicYearId">{{academicYear.academicYear}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <input matInput [matDatepicker]="dp" placeholder="Exam Month and Year" [value]="date">
                        <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
                        <mat-datepicker #dp startView="multi-year"  (monthSelected)="chosenMonthHandler($event, dp)" panelClass="example-month-picker">
                        </mat-datepicker>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <input matInput placeholder="Exam Group Code" name="examGroupCode" formControlName="examGroupCode" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <input matInput placeholder="Exam Group Name" name="examGroupName" formControlName="examGroupName" required>
                    </mat-form-field>
                </div>
                <div fxLayout="row wrap " fxFlex="100" style="margin-top: 15px">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="examGroupModalForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>

            <button mat-raised-button class="cls-btn" mat-dialog-close>
        Close
    </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
        Save
    </button>
        </mat-dialog-actions>
    </form>
</div>
