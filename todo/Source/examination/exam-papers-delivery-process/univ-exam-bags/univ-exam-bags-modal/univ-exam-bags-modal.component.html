<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span>  {{dialogTitle}}</span>
                </div>
            </div>
        </div>
        <form name="staffForm" [formGroup]="staffForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <form name="staffForm" [formGroup]="staffForm" novalidate>
                        <div fxLayout="row">
                        
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20" >
                                <mat-select placeholder="Program" name="courseId" formControlName="courseId"   (selectionChange)="selectedCourse(staffForm.value.courseId)" required>
                                    <mat-option *ngFor="let course of courses" [value]="course.fk_course_id">{{course.course_code}}</mat-option>
                                </mat-select>
                            </mat-form-field>

                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="18" fxFlex.gt-md="18">
                                <mat-select placeholder="Academic Year" name="academicYearId" formControlName="academicYearId" (selectionChange)="selectedAcademicYear(staffForm.value.academicYearId)" required>
                                    <mat-option *ngFor="let obcjt of academicYears" [value]="obcjt.fk_academic_year_id">{{obcjt.academic_year}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                           
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="60" fxFlex.gt-md="60">
                              <mat-select placeholder="Exam" name="examId" formControlName="examId" (selectionChange)="selectedExam(staffForm.value.examId)">
                                  <ngx-mat-select-search [placeholderLabel]="'Search Exam...'"
                                  [noEntriesFoundLabel]="'no matching data found'" (keyup)="searchExam($event.target.value)"></ngx-mat-select-search>   
                                  <mat-option *ngFor="let exam of examData" [value]="exam.fk_exam_id" matTooltip="{{exam.exam_name}} ({{exam.from_date | date:'MMM d, y'}} - {{exam.to_date | date:'MMM d, y'}})"
                                  >{{exam.exam_name}} ({{exam.from_date | date:'MMM d, y'}} - {{exam.to_date | date:'MMM d, y'}})
                                      <span *ngIf="exam.is_internal_exam" style="color: #0014ff;font-weight: 500;">(Internal)</span>
                                      <span *ngIf="exam.is_regular_exam" style="color: #0014ff;font-weight: 500;">(Regular)</span>
                                      <span *ngIf="exam.is_supply_exam" style="color: #0014ff;font-weight: 500;">(Supple)</span>
                                  </mat-option>
                              </mat-select>
                          </mat-form-field>

<!--                           
                          <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="60" fxFlex.gt-md="60">
                            <mat-select placeholder="Exam Center" name="univExamcenterId" formControlName="univExamcenterId" required>
                                <mat-option *ngFor="let obj of univExamCenters" [value]="obj.univExamcenterId">{{obj.examcenterCode}}</mat-option>
                            </mat-select>
                        </mat-form-field> -->
                        
                        </div>
                        <!-- <div fxLayout="row" >
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="15" fxFlex.gt-md="15" >
                                <mat-select placeholder="Branch " name="courseGroupId" formControlName="courseGroupId"   (selectionChange)="selectedGroup(staffForm.value.courseGroupId)" >
                                  <mat-option [value]="0" >All</mat-option>  
                                  <mat-option *ngFor="let courseGroup of courseGroups" [value]="courseGroup.fk_course_group_id">{{courseGroup.group_code}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="15" fxFlex.gt-md="15" >
                                <mat-select placeholder="Semester" name="courseYearId" formControlName="courseYearId" >
                                    <mat-option [value]="0" >All</mat-option>   
                                  <mat-option *ngFor="let courseYear of courseYears" [value]="courseYear.fk_course_year_id">{{courseYear.course_year_name}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="40" fxFlex.gt-md="40" >
                                <mat-select placeholder="Student" name="studentId" formControlName="studentId" #singleSelect (selectionChange)="selectedStd(staffForm.value.studentId)" >
                                    <ngx-mat-select-search [formControl]="studentFilterCtrl" [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'no matching data found'" (keyup)="enteredStudent($event)"></ngx-mat-select-search>
                                    <mat-option [value]="0" >All</mat-option> 
                                    <mat-option *ngFor="let std of filteredStudents | async" [value]="std.hallticketNumber">{{std.hallticketNumber}}<span class="rol-no" *ngIf="std.firstName != null">({{std.firstName}})</span></mat-option>
                                </mat-select>
                              </mat-form-field>
                            <div class="savebtn-align" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="15" fxFlex.gt-md="15">
                                <button mat-raised-button class="add-btn" color="accent" (click)="getDetails()">Get Report</button>
                            </div>
                            <div class="savebtn-align" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="5" fxFlex.gt-md="5">
                                  <span class="material-icons" (click)="reset()" 
                                  style="cursor: pointer;margin-top: 17px;" matTooltip="Reset">
                                          cached
                                          </span></div>
                        </div> -->
                    </form>
                    <div fxLayout="row wrap " fxFlex="100">
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <mat-select placeholder="Exam Center" name="univExamcenterId" formControlName="univExamcenterId" required>
                                <mat-option *ngFor="let obj of univExamCenters" [value]="obj.univExamcenterId">{{obj.examcenterCode}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                            <input matInput placeholder="Bag Serial No" name="bagSerialNo" formControlName="bagSerialNo" required>
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Total Answer Books" name="totalAnswerBooks" formControlName="totalAnswerBooks" required>
                        </mat-form-field>
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                        <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <mat-select placeholder="dispatchStatusCatdetId" name="dispatchStatusCatdetId" formControlName="dispatchStatusCatdetId" required>
                                <mat-option *ngFor="let obj of univExamCenters" [value]="obj.dispatchStatusCatdetId">{{obj.examcenterCode}}</mat-option>
                            </mat-select>
                        </mat-form-field> -->
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25" >
                            <input matInput placeholder="Tracker Id" name="trackerId" formControlName="trackerId" required>
                        </mat-form-field>
                       
                           <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <mat-select placeholder="Sealed By User" name="sealedbyUserId" formControlName="sealedbyUserId" required>
                                <mat-option *ngFor="let obj of univExamCenters" [value]="obj.dispatchStatusCatdetId">{{obj.examcenterCode}}</mat-option>
                            </mat-select>
                        </mat-form-field> -->
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <input matInput placeholder="Sealed By Name" name="sealedbyName" formControlName="sealedbyName" required>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <mat-select placeholder="Dispatch Status" name="dispatchStatusCatdetId" formControlName="dispatchStatusCatdetId" required>
                                <mat-option *ngFor="let obj of examBagDispatchStatusList" [value]="obj.generalDetailId">{{obj.generalDetailDisplayName}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                      
                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                            <mat-checkbox name="isSealed" formControlName="isSealed">is Sealed</mat-checkbox>
                        </section>

                    
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                            <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                        </section>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="staffForm.value.isActive === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                    </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                            Close
                            </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                 Save
                 </button>

            </mat-dialog-actions>
        </form>
    </div>
</div>
