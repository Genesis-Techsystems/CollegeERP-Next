<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                            layers
                            </i>
                <!-- <mat-icon>calendar_view_day</mat-icon> -->
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="floorForm" [formGroup]="floorForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column">
                <div fxLayout="row wrap " fxFlex="100">

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-select placeholder="Block" name="blockId" formControlName="blockId" required>
                            <mat-option *ngFor="let block of blocks" [value]="block.blockId">
                                {{block.blockName}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput placeholder="Floor Name" name="floorName" formControlName="floorName" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="Floor No" name="floorNo" formControlName="floorNo" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput type="number" placeholder="No Of Rooms" name="noOfRooms" formControlName="noOfRooms">
                    </mat-form-field>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="floorForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>

            <button mat-raised-button class="cls-btn" mat-dialog-close>
            Close
        </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
            Save
        </button>
        </mat-dialog-actions>
    </form>
</div>
