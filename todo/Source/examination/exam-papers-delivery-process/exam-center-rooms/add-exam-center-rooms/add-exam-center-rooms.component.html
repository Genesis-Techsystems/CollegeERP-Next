<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <mat-icon class="icon-align">meeting_room</mat-icon>
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="roomForm" [formGroup]="roomForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column">
                <div fxLayout="row wrap " fxFlex="100">

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <mat-select placeholder="Block" name="blockId" formControlName="blockId" (selectionChange)="SelectedBlock(roomForm.value.blockId)">
                            <mat-option *ngFor="let block of blocks" [value]="block.blockId" requiered>
                                {{block.blockName}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <mat-select placeholder="Floor" name="floorId" formControlName="floorId" requiered>
                            <mat-option *ngFor="let floor of floors" [value]="floor.floorId">
                                {{floor.floorName}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <mat-select placeholder="Room Type" name="roomTypeId" formControlName="roomTypeId" requiered>
                            <mat-option *ngFor="let roomType of roomTypes" [value]="roomType.roomTypeId">
                                {{ roomType.roomType}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput placeholder="Room Name" name="roomName" formControlName="roomName">
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput placeholder="Room Code" name="roomCode" formControlName="roomCode" requiered>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput placeholder="Occupancy" type="number" name="occupancy" formControlName="occupancy" requiered>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput placeholder="Total Rows" type="number" name="examrows" formControlName="examrows" >
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <input matInput placeholder="Total Columns" type="number" name="examcolumns" formControlName="examcolumns" >
                    </mat-form-field>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="roomForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close>
                        Close
                    </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                        Save
                    </button>
        </mat-dialog-actions>
    </form>
</div>
