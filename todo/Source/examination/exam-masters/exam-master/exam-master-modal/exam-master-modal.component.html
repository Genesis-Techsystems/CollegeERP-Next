<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                            layers
                            </i>
                <!-- <mat-icon>calendar_view_day</mat-icon> -->
                <span>{{dialogTitle}}</span>
                <strong class="table-heads" style="margin-left: 12px;font-size: 14px !important;">({{data.universityCode}}
                    <span *ngIf="data?.collegeCode != null || data?.collegeCode != ''">/ {{data?.collegeCode}}</span>
                    / {{data.courseCode}} / {{data.academicYear}}) </strong>
            </div>
        </div>
    </div>
    <form name="examMastersForm" [formGroup]="examMastersForm" novalidate>
        <mat-dialog-content>
            <!-- <div fxLayout="column" class="mlr-15 inner-bkgrd div-border">

                <div fxLayout="row wrap " fxFlex="100" *ngIf="data != null">
                    <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="7" fxFlex.gt-md="7" style="margin-left: 10px;">
                        <p class="details-off">Course : </p>
                    </div>
                    <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="28" fxFlex.gt-md="28">
                        <p class="details-off"><span class="rol-no"> {{data.collegeCode}} / {{data.courseCode}} </span></p>
                    </div>
                
                    <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="10" fxFlex.gt-md="10">
                        <p class="details-off">Exam Year : </p>
                    </div>
                    <div fxLayout="column"  fxFlex="100" fxFlex.gt-xs="21" fxFlex.gt-md="21">
                        <p class="details-off"><span class="rol-no">{{data.academicYear}} </span></p>
                    </div>
                </div>
                    </div> -->
            <div fxLayout="column" style="margin-top: 10px;">
                <div fxLayout="row wrap " fxFlex="100">
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                        <input matInput placeholder="Exam Name" name="examName" formControlName="examName" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="19" fxFlex.gt-md="19">
                        <input matInput placeholder="Exam Short Name" name="examShortName" formControlName="examShortName" required>
                    </mat-form-field>
                    <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput [matDatepicker]="dp" placeholder="Exam Month and Year" name="examMonthYr" formControlName="examMonthYr">
                        <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
                        <mat-datepicker #dp startView="multi-year" panelClass="example-month-picker">
                        </mat-datepicker>
                    </mat-form-field> -->
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput [matDatepicker]="dp" placeholder="Exam Month and Year" [value]="date">
                        <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
                        <mat-datepicker #dp startView="multi-year"  (monthSelected)="chosenMonthHandler($event, dp)" panelClass="example-month-picker">
                        </mat-datepicker>
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput [matDatepicker]="fDate" placeholder="From Date" name="fromDate"  [min]="minDate"   (dateChange)="calDay()" formControlName="fromDate">
                        <mat-datepicker-toggle matSuffix [for]="fDate"></mat-datepicker-toggle>
                        <mat-datepicker #fDate></mat-datepicker>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput [matDatepicker]="tDate" placeholder="To Date" [min]="examMastersForm.value.fromDate"  (dateChange)="calDay()" name="toDate" formControlName="toDate">
                        <mat-datepicker-toggle matSuffix [for]="tDate"></mat-datepicker-toggle>
                        <mat-datepicker #tDate></mat-datepicker>
                    </mat-form-field>
                    <section fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" *ngIf="flag == 0 || flag == 1">
                        <mat-checkbox name=" isRegularExam " formControlName="isRegularExam" (change)=checkboxValidation()>Regular Exam</mat-checkbox>
                    </section>
                    <section fxLayout="column " class="p-8 " fxFlex="100 " fxFlex.gt-xs="33 " fxFlex.gt-md="33 " *ngIf="flag == 0 || flag == 1">
                        <mat-checkbox name="isSupplyExam" formControlName="isSupplyExam" (change)=checkboxValidation()>Supple Exam</mat-checkbox>
                    </section>
                    <section fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" *ngIf="flag == 0 || flag == 2">
                        <mat-checkbox name="isInternalExam" formControlName="isInternalExam" (change)=checkboxValidation()>Internal Exam</mat-checkbox>
                    </section>
                </div>
                <div fxLayout="row wrap " fxFlex="100"  style="margin-top: 10px;">
                    <section fxLayout="column" class="  p-8" fxFlex="100" fxFlex.gt-xs="38" fxFlex.gt-md="38">
                        <mat-checkbox name="isResultprocessStarted" formControlName="isResultprocessStarted">Is Result Process Started</mat-checkbox>
                    </section>
                    <section fxLayout="column" class="  p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <mat-checkbox name="isPublished" formControlName="isPublished">Is Published</mat-checkbox>
                    </section>
                </div>
                <div class="card-divider">Exam Notification  </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="30" fxFlex.gt-md="30">
                        <input matInput [matDatepicker]="nDate" placeholder="Date" name="notificationPublishedOn" formControlName="notificationPublishedOn">
                        <mat-datepicker-toggle matSuffix [for]="nDate"></mat-datepicker-toggle>
                        <mat-datepicker #nDate></mat-datepicker>
                    </mat-form-field>
                    <div class="savebtn-align" style="position: relative;" style="margin: auto 0px !important;" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <!-- <label>Notification File Upload: </label> -->
                        <label></label>
                        <input type="file" accept=".png, .jpg, .jpeg, .pdf, .doc" #examNtfcAvatar>
                    </div>
                    <div class="savebtn-align" style="position: relative;" style="margin: auto 0px !important;" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" *ngIf="data.notificationFilePath != null ">
                        <!-- <label>Fee Notification File Upload: </label> -->
                        <label></label>
                      <span ><a style="color: blue !important;" href="{{data.notificationFilePath}}" target="_blank">View File</a></span>
                    </div>
                </div>
                <div class="card-divider">Exam Fee Notification  </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="30" fxFlex.gt-md="30">
                        <input matInput [matDatepicker]="fnDate" placeholder="Date" name="feeNotificationPublishedOn" formControlName="feeNotificationPublishedOn">
                        <mat-datepicker-toggle matSuffix [for]="fnDate"></mat-datepicker-toggle>
                        <mat-datepicker #fnDate></mat-datepicker>
                    </mat-form-field>
                    <div class="savebtn-align" style="position: relative;" style="margin: auto 0px !important;" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <!-- <label>Fee Notification File Upload: </label> -->
                        <label></label>
                        <input type="file" accept=".png, .jpg, .jpeg, .pdf, .doc" #examFeeNtfcAvatar>
                    </div>
                    <div class="savebtn-align" style="position: relative;" style="margin: auto 0px !important;" fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" *ngIf="data.feeNotificationFilePath != null ">
                        <!-- <label>Fee Notification File Upload: </label> -->
                        <label></label>
                      <span ><a style="color: blue !important;" href="{{data.feeNotificationFilePath}}" target="_blank">View File</a></span>
                    </div>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <section fxLayout="column" class="  p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="examMastersForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close>
            Close
        </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
            Save
        </button>
        </mat-dialog-actions>
    </form>
</div>
