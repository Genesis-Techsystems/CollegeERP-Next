<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                    layers
                </i>
                <!-- <mat-icon>calendar_view_day</mat-icon> -->
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="marksSetupForm" [formGroup]="marksSetupForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column">
                <div fxLayout="row wrap " fxFlex="100">
                    <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <mat-select placeholder="Faculty" name="collegeId" formControlName="collegeId" required>
                            <mat-option *ngFor="let objct of colleges"
                                [value]="objct.fk_college_id">{{objct.college_code}}</mat-option>
                        </mat-select>
                    </mat-form-field> -->
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <mat-select placeholder="University" name="universityId" formControlName="universityId" required>
                            <mat-option *ngFor="let objct of universities"
                                [value]="objct.fk_university_id">{{objct.university_code}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <input matInput placeholder="Exam Session Name" name="examSessionName"
                            formControlName="examSessionName" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <mat-select placeholder="Session In" name="examsessioninCatId"
                            formControlName="examsessioninCatId" required>
                            <mat-option *ngFor="let objt of sessionsIn"
                                [value]="objt.pk_gd_id">{{objt.gd_code}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <label>Start Time</label>
                        <w-mat-timepicker color="primary" [(userTime)]="startTime"></w-mat-timepicker>
                    </div>
                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <label>End Time</label>
                        <w-mat-timepicker color="primary" [(userTime)]="endTime"></w-mat-timepicker>
                    </div>
                </div>
                <div fxLayout="row wrap " fxFlex="100">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50"
                        *ngIf="marksSetupForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close>
                Close
            </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                Save
            </button>
        </mat-dialog-actions>
    </form>
</div>
