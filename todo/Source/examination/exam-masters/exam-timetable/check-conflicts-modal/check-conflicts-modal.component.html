<div class="add-form">
    <!-- <h2 mt-dialog-title>Add Organization</h2>
     <hr> -->
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align">
                                event_note
                                </i>
                    <span>Check Conflicts</span>
                </div>
            </div>
        </div>
        
            <mat-dialog-content>
                <div  fxLayout="row" *ngIf="flag" >
                    <div fxLayout="column" style="display: flow;margin-left: 38%;" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">  
                       <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <mat-icon class="msgicon">check_circle_outline</mat-icon>
                        </div>
                       <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <span class="msg" >
                        No Conflicts Found!
                        </span>
                        </div>
                        </div>
                 </div>  
                <div fxLayout="row" *ngIf="conflictsdata.length > 0">
                    <div fxLayout="column " fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">
                        <mat-card class="pd-card table-align">
                               
                        <div class="mat-elevation-z8">
                            <div class="example-container">
                                <mat-card-content>
                                    <div fxLayout="row" fxLayout.xs="column" class="search-align" fxLayoutAlign="space-between" fxLayoutGap="5">
                                        <div class="search-input-wrapper mx-24 m-md-0" fxFlex.gt-xs="30" fxFlex.gt-md="35" fxLayout="row" fxLayoutAlign="start center" style="margin-bottom: 10px;">
                                            <label for="search" class="mr-8">
                                            <mat-icon class="secondary-text">search</mat-icon>
                                        </label>
                                            <mat-form-field floatLabel="never" fxFlex="1 0 auto" style="margin-left: 10px">
                                                <input matInput (keyup)="applyFilter($event.target.value)" placeholder="Search">
                                            </mat-form-field>
                                        </div>
                                        
                                    </div>
                                  
                                </mat-card-content> 
                                <table mat-table [dataSource]="dataSource" matSort>
                                    <ng-container matColumnDef="id">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>SI.No</th>
                                        <td mat-cell *matCellDef="let row index as i">{{i+1}} </td>
                                    </ng-container>
            
                                    <ng-container matColumnDef="hallticket_number">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Hall Ticket No.</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.hallticket_number}} </td>
                                    </ng-container>
            
                                    <!-- Semisters Column -->
                                    <ng-container matColumnDef="student_name">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Student Name</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.student_name}} </td>
                                    </ng-container>
                                    <ng-container matColumnDef="fk_exam_id">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Exam Name</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.fk_exam_id}} </td>
                                    </ng-container>
    
                                    <ng-container matColumnDef="exam_date">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Exam Date</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.exam_date}} </td>
                                    </ng-container>
                                    <ng-container matColumnDef="subject_name">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Subject Name</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.subject_name}} </td>
                                    </ng-container>
                                    <!-- <ng-container matColumnDef="Subject Count">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Subject Count</th>
                                        <td mat-cell *matCellDef="let row"> {{row?.SubjectCount}} </td>
                                    </ng-container> -->
                                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                                    <tr mat-row *matRowDef="let row; columns: displayedColumns;">
                                    </tr>
                                </table>
                             
                            </div>
                            <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            
                        </div>
            </mat-card>
            </div>
                    </div>
            </mat-dialog-content>
            <mat-dialog-actions class="popup-btn">
                <button mat-raised-button class="add-btn" color="accent"  mat-dialog-close *ngIf="flag">
                    Ok
                    </button>
                <button mat-raised-button class="back-btn"  mat-dialog-close *ngIf="conflictsdata.length > 0">
                    Close
                    </button>
            
            </mat-dialog-actions>
    </div>
    </div>
