<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                        layers
                        </i>
                <!-- <mat-icon>calendar_view_day</mat-icon> -->
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="marksSetupForm" [formGroup]="marksSetupForm" novalidate>
        <mat-dialog-content>
                <div fxLayout="column" class="mlr-15 inner-bkgrd div-border" style="margin-top: 10px;padding: 5px !important;">

                        <div fxLayout="row wrap " fxFlex="100">
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="12" fxFlex.gt-md="12" *ngIf="!isEmptyObject(data)">
                                <p class="details-off">Course :</p>
                            </div>
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                                <p class="details-off"><span class="rol-no"> {{data.collegeCode}} / {{data.courseCode}} </span></p>
                            </div>
                        </div>
                        
                            </div>
            <div fxLayout="column">
                
                <div fxLayout="row wrap " fxFlex="100">

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <input matInput placeholder="Marks Setup Name" name="markSetupName" formControlName="markSetupName" required>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <mat-select placeholder="Regulation" [formControl]="publisherMultiCtrl" [multiple]="true">
                            <ngx-mat-select-search [formControl]="publisherFilterCtrl" [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'no matching data found'"></ngx-mat-select-search>
                            <mat-option *ngFor="let reg of filteredpublishers | async" [value]="reg.regulationId">{{reg.regulationCode}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                        <mat-select placeholder="Result Validation" name="resultvalidationCatId" formControlName="resultvalidationCatId" >
                            <mat-option *ngFor="let rv of resultValidations" [value]="rv.generalDetailId">{{rv.generalDetailDisplayName}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isHavingoptions" formControlName="isHavingoptions">Having Options</mat-checkbox>
                    </section>
                </div>
                <div fxLayout="row wrap " fxFlex="100" style="margin-top: 15px">
                    <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                        <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                    </section>
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="marksSetupForm.controls.isActive.value === false">
                        <input matInput placeholder="Reason" name="reason" formControlName="reason">
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>

            <button mat-raised-button class="cls-btn" mat-dialog-close>
        Close
    </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
        Save
    </button>
        </mat-dialog-actions>
    </form>
</div>
