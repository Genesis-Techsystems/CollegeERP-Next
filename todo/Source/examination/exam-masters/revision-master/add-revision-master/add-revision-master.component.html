<div class="content">
  <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
      <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
          <div fxLayoutAlign="start center" class="mod-head">
              <i class="material-icons icon-align">
                      layers
                      </i>
              <!-- <mat-icon>calendar_view_day</mat-icon> -->
              <span>{{dialogTitle}}</span>
          </div>
      </div>
  </div>
  <form name="revisionForm" [formGroup]="revisionForm" novalidate>
      <mat-dialog-content>
          <div fxLayout="column">
              <div fxLayout="row wrap " fxFlex="100">
                  <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="35" fxFlex.gt-md="35">
                          <mat-select placeholder="Exam Revision Type" name="examRevisionTypeId" formControlName="examRevisionTypeId" required>
                              <mat-option *ngFor="let revType of revisionTypes" [value]="revType.generalDetailId">{{revType.generalDetailDisplayName}}</mat-option>
                          </mat-select>
                  </mat-form-field>
              </div>
              <div fxLayout="row wrap " fxFlex="100">
                  <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                        <input matInput type="number" step="any" placeholder="Amount" name="amount" formControlName="amount" required>
                  </mat-form-field>
                  <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                    <input matInput [matDatepicker]="fDate" placeholder="From Date" name="fromDate" formControlName="fromDate">
                    <mat-datepicker-toggle matSuffix [for]="fDate"></mat-datepicker-toggle>
                    <mat-datepicker #fDate></mat-datepicker>
                  </mat-form-field>
                  <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                      <input matInput [matDatepicker]="tDate" placeholder="To Date" [min]="revisionForm.value.fromDate" name="toDate" formControlName="toDate">
                      <mat-datepicker-toggle matSuffix [for]="tDate"></mat-datepicker-toggle>
                      <mat-datepicker #tDate></mat-datepicker>
                  </mat-form-field>
              </div>
              <div fxLayout="row wrap " fxFlex="100" style="margin-top: 15px">
                  <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                      <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                  </section>
                  <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="revisionForm.controls.isActive.value === false">
                      <input matInput placeholder="Reason" name="reason" formControlName="reason">
                  </mat-form-field>
              </div>
          </div>
      </mat-dialog-content>
      <mat-dialog-actions>

          <button mat-raised-button class="cls-btn" mat-dialog-close>
      Close
  </button>
          <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
      Save
  </button>
      </mat-dialog-actions>
  </form>
</div>
