<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span>  View Barcode</span>
                </div>
            </div>
        </div>
        <mat-dialog-content>
<div fxLayout="row">
    <div fxLayout="column" fxFlex="100">
        <div class="mat-elevation-z8">
            <div class="example-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>SI.No</th>
                        <td mat-cell *matCellDef="let row"> {{examEvaluationList.indexOf(row) + 1}} </td>
                    </ng-container>

                    <!-- <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> SI.No </th>
                        <td mat-cell *matCellDef="let row"> {{examEvaluationList.indexOf(row) + 1}} </td>
             
                    </ng-container> -->

                    <!-- Semisters Column -->

                    <ng-container matColumnDef="evaluatorName">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Evaluator Name</th>
                        <td mat-cell *matCellDef="let row"> {{row.evaluatorName}} </td>
                    </ng-container>

                    <!-- Semisters Column -->
                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Evaluator Email</th>
                        <td mat-cell *matCellDef="let row"> {{row.email}} </td>
                    </ng-container>
                    <ng-container matColumnDef="examTimetableDetId">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>BarCode Number</th>
                        <td mat-cell *matCellDef="let row"> {{row.examTimetableDetId}} </td>
                    </ng-container>

                    <!-- Semisters Column -->
                    <ng-container matColumnDef="questionPaperId">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Marks</th>
                        <td mat-cell *matCellDef="let row"> {{row.questionPaperId}} </td>
                    </ng-container>
                  
                
                
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;">
                    </tr>
                </table>
             
            </div>
            <!-- <mat-paginator [pageSizeOptions]="[10, 25, 100]"></mat-paginator> -->

        </div>

    </div>

</div>

</mat-dialog-content>
<mat-dialog-actions>
<button mat-raised-button class="cls-btn" mat-dialog-close>
            Close
            </button>
<!-- <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
 Save
 </button> -->

</mat-dialog-actions>
</div>
</div>
