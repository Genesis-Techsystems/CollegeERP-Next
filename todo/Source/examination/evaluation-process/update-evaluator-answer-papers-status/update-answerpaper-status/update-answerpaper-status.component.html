<div class="add-form">
    <!-- <h2 mt-dialog-title>Add Organization</h2>
     <hr> -->
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align">
                                event_note
                                </i>
                    <span> Update Status</span>
                </div>
            </div>
        </div>
        <form name="statusForm" [formGroup]="statusForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">
                            <mat-select placeholder="Evaluation Paper Status" name="evaluationStatus" formControlName="evaluationStatus" required>
                                <mat-option *ngFor="let item of evaluationStatusData" [value]="item.generalDetailId">{{item.generalDetailDisplayName}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                       
                    </div>
                  
                </div>
            </mat-dialog-content>
            <mat-dialog-actions class="popup-btn">
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                    Submit
                    </button>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
        Close
           </button>
            
            </mat-dialog-actions>
        </form>
    </div>
    </div>
