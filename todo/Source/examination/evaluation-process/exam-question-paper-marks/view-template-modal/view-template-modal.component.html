<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                        ballot
                    </i>
                    <span>{{dialogTitle}} <span *ngIf="details.template_title">- {{details.template_title}}</span></span>
                </div>
            </div>
        </div>
        <mat-dialog-content >
            <table *ngFor="let template of templateDetails1" id="table">
                <tr *ngIf="template.level1no > 0 && template.groupno == 0 && template.subgroupno == 0">
                    <td colspan="4" style="text-align: center;">{{template.QuestionTitle}}</td>
                </tr>
                <tr *ngIf="template.level1no > 0 && template.groupno > 0 && template.subgroupno == 0">
                    <td><b>{{template.groupno}}.</b></td>
                    <td>&nbsp;&nbsp;</td>
                    <td style="width:100%">{{template.QuestionTitle}}</td>
                    <td><b>{{template.question_marks}}</b></td>
                </tr>
                <tr *ngIf="template.questioncode != null">
                    <td>&nbsp;&nbsp;</td>
                    <td>{{template.questioncode}}</td>
                    <td style="width:100%"></td>
                    <td>{{template.individual_question_marks}}</td>
                </tr>
                <tr *ngIf="template.displaydowntext != null || template.displaydowntext != ''">
                    <td colspan="4" style="text-align: center;"><b>{{template.displaydowntext}}</b></td>
                </tr>
            </table>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close (click)="Close()">
                Close
            </button>
        </mat-dialog-actions>
    </div>
</div>
