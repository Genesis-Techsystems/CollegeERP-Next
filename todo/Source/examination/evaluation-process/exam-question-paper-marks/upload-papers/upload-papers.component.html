

    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span> Upload Question Paper & Model Answer Paper  </span>
                </div>
            </div>
        </div>
            <mat-dialog-content>
                <div fxLayout="column">

                    
   <div style="margin-left: 39px;">
   <b> Question Paper :-</b>
    <input type="file"   multiple="multiple" id='selectedFile${i+1}' #QuestionPaper (change)="uploadQuestionPaper(QuestionPaper.files)"  class="choose">
   </div>
   <div style="margin-top: 15px;">
    <b>Model Answer Paper :-</b>
    <input type="file"   multiple="multiple" id='selectedFile${i+1}' #modelAnswerPaper (change)="uploadAnswerPaper(modelAnswerPaper.files)" class="choose">
   </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                          <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                            Save
                            </button>
            </mat-dialog-actions>
    </div>
