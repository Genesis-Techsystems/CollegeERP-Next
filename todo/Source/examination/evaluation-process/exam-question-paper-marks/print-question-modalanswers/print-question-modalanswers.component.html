
<div id="dashboard" class="layout" id="printsection">

    <div  class="page-layout simple "  >
  
      <div fxLayout="row"  >
         <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100" class="questions">
            <div class="header">
                <!-- <h2>M.Tech. Computer Science & Engineering (CBCS Pattern) Semester - II </h2> -->
                <h2 class="capital"><b>{{params.examName}}</b></h2>
                <h1> <b>(Questions & Model Answers)</b> </h1> 
                <h2 class="capital">{{params.CourseCode}} &nbsp;{{params.CourseGroupCode}} &nbsp;{{params.CourseYear}}</h2>
                <h1> <b>{{params.subjectCodeName}}-{{params.subjectcode}}</b> </h1> 
            </div>
       <div fxLayout="column" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="100">
       </div>
            <div ><hr /></div>
         
           <div *ngFor="let row of questionPaper" >
            <p>{{row.questionCode}} &nbsp; {{row.question  | htmlToPlaintext}} &nbsp; <b>({{row.questionMarks}}&nbsp;marks)</b></p> 
            <p> A) {{row.modelAnswer1}}</p>
           </div>
           <div class="printbtn">
            <button  id="printPageButton" mat-raised-button class="back-btn" (click)="printBack()">
              Back</button>
              <button  id="printPageButton" mat-raised-button class="add-btn" color="accent" (click)="printPage('printsection')">
                  Print</button>
          </div>
         </div>
       
      </div>
     
    </div>
</div>
