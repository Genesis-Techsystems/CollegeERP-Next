<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                                ballot
                                </i>
                    <span>{{dialogTitle}}</span>
                </div>
            </div>
        </div>
            <mat-dialog-content>
                        <div fxLayout="column" style="margin: 15px 18px 18px 18px;" >
                        
                        <mat-accordion style="width: 100%;padding: 0px;" *ngFor="let row of examQuestionpapersmarks1" >
                            <mat-expansion-panel [expanded]="step === 0" hideToggle style="margin: 0px 25px;">
                                <mat-expansion-panel-header>
                                    <mat-panel-title style="display: contents;">
                                        <div fxLayout="column" fxLayoutAlign="center center" fxLayout.gt-xs="column" fxLayoutAlign.gt-xs="center start">
                                            <div class="black-fg" fxLayout="row" fxLayoutAlign="start center">
                                            <span><b>{{row.questionCode}} </b>  &nbsp; <strong>{{row.question | htmlToPlaintext}}</strong>  &nbsp; <b>({{row.questionMarks}} Marks)</b></span>
                                        </div>
                                        </div>
                                    </mat-panel-title>
                                </mat-expansion-panel-header>
                                <div fxLayout="row" class="row-align" style="position: relative;" >
                                    <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="75" fxFlex.gt-md="75" >
                                        <mat-icon class=" icon-align ed-bin" (click)="editQuestion(row)">border_color</mat-icon>
                                        <mat-icon class=" icon-align dl-bin" (click)="delQuestion(row)">delete</mat-icon>
                                <ul style="padding: 0 30px;
                                margin: 0;">
                                <li style="color: #4CAF50; text-align: justify;">
                                    {{row.modelAnswer1}}
        
                                </li></ul>
                                    </div>
                                </div>
                            </mat-expansion-panel>
                        </mat-accordion>
                        </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close (click)="Close()">
                            Close
                            </button>
            </mat-dialog-actions>
    </div>
  </div>
