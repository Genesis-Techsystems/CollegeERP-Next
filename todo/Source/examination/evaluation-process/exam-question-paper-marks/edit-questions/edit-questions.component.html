<div class="content">
    <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
        <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
            <div fxLayoutAlign="start center" class="mod-head">
                <i class="material-icons icon-align">
                    book
                </i>
                <span>{{dialogTitle}}</span>
            </div>
        </div>
    </div>
    <form name="questionEditForm" [formGroup]="questionEditForm" novalidate>
        <mat-dialog-content>
            <div fxLayout="column">
                <div fxLayout="row wrap " fxFlex="100">
                    <!-- <textarea class="textAR" fxFlex="100" placeholder="Description" name="question"
                        formControlName="question"></textarea>
                         -->
                    <!-- <textarea 
                        class="textAR" fxFlex="100" placeholder="Description" name="question"
                        formControlName="question">
                    <p> [innerHtml]="question" </p>
                    </textarea> -->
                    <!-- <quill-editor [(ngModel)]="question" placeholder="Edit Question" 
                    [ngModelOptions]="{standalone: true}" [styles]="{height: '160px'}" style="width: 80% !important;"></quill-editor> -->
                    <editor [(ngModel)]="question" placeholder="Enter Question" [ngModelOptions]="{standalone: true}"
                        [apiKey]="editorApiKey" [init]="options">
                    </editor>

                </div>
                <div fxLayout="row" fxFlex="20" style="padding-left: 10px; display: flex; align-items: center;">
                    <mat-form-field appearance="outline" fxFlex="100">
                        <mat-label>Marks</mat-label>
                        <input matInput type="number" [(ngModel)]="questionMarks" [ngModelOptions]="{standalone: true}"
                            placeholder="0" />
                    </mat-form-field>
                </div>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button mat-raised-button class="cls-btn" mat-dialog-close>
                Close
            </button>
            <button mat-raised-button class="add-btn" color="warn" (click)="deleted()">
                Delete
            </button>
            <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                Save
            </button>
        </mat-dialog-actions>
    </form>
</div>
