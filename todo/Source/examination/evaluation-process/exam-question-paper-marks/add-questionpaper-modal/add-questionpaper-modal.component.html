<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>  {{dialogTitle}}  </span>z
                </div>
            </div>
        </div>
        <form name="addquestionpaperForm" [formGroup]="addquestionpaperForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <mat-select placeholder="Course" name="courseId" formControlName="courseId" disabled (selectionChange)="selectedCourse(addquestionpaperForm.value.courseId)">
                                <mat-option *ngFor="let courseCode of CourseDetails" [value]="courseCode.fk_course_id">{{courseCode.course_code}}</mat-option>
                             </mat-select>
                        </mat-form-field>

                        
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <mat-select placeholder="Academic Year" name="academicYearId" formControlName="academicYearId" disabled (selectionChange)="selectedAcademicYear(addquestionpaperForm.value.academicYearId)">
                                <mat-option *ngFor="let academicYear of academicYearDetailList" [value]="academicYear.fk_academic_year_id">{{academicYear.academic_year}}</mat-option>
                             </mat-select>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                            <mat-select placeholder="Exam" name="examId"  formControlName="examId" disabled (selectionChange)="selectedExam(addquestionpaperForm.value.examId)">
                                <ngx-mat-select-search [noEntriesFoundLabel]="'no matching data found'" (keyup)="searchExam($event.target.value)"
                                [placeholderLabel]="'Search...'" ></ngx-mat-select-search>
                                <mat-option *ngFor="let exam of examDuplicateList" [value]="exam.fk_exam_id">{{exam.exam_name}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                        
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <mat-select placeholder="Regulation Id" name="regulationId" formControlName="regulationId" disabled >
                                <mat-option *ngFor="let RegulationCode of regulations" [value]="RegulationCode.fk_regulation_id">{{RegulationCode.regulation_code}}</mat-option>
                             </mat-select>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20"
                                    fxFlex.gt-md="20">
                                    <mat-select placeholder="Course Years" name="courseYearId"
                                        formControlName="courseYearId" disabled>
                                        <mat-option [value]="0"> All </mat-option>
                                        <mat-option *ngFor="let courseYear of courseYears"
                                            [value]="courseYear.fk_course_year_id">{{courseYear.course_year_code}}</mat-option>
                                    </mat-select>
                            </mat-form-field>

                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="30" fxFlex.gt-md="30">
                                <mat-select placeholder="Subject" name="Subject" formControlName="subjectId" disabled (selectionChange)="selectedSubject(addquestionpaperForm.value.subjectId)">
                                    <ngx-mat-select-search [noEntriesFoundLabel]="'no matching data found'" (keyup)="searchSubject($event.target.value)"
                                    [placeholderLabel]="'Search...'" ></ngx-mat-select-search>
                                    <mat-option *ngFor="let subject of subjectDuplicateList" [value]="subject.fk_subject_id" matTooltip="{{subject.subject_code}}-{{subject.subject_name}}">{{subject.subject_code}}-{{subject.subject_name}}</mat-option>
                                 </mat-select>
                            </mat-form-field>

                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                                <mat-select placeholder="Template" name="Template" formControlName="examQuestionPaperTemplateId" disabled >
                                   
                                    <mat-option *ngFor="let obj of temlateListDetails" [value]="obj.fk_exam_questionpaper_template_id">{{obj.template_title}}</mat-option>
                                 </mat-select>
                            </mat-form-field>
                            <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="10" fxFlex.gt-md="10">
                                <label>View template</label>
                                <button mat-icon-button>
                                    <mat-icon  (click)="viewTemplate()"  class="edit">remove_red_eye</mat-icon>&nbsp;&nbsp;&nbsp;
                                     </button>
                            </div>
                          

                       

                    </div>

                   <div fxLayout="column" style="margin: 15px 18px 18px 18px;" >
                    <p style="    font-size: 19px;
                    font-weight: 600;
                    padding: 8px 13px;
                    margin: 0;
                    border-bottom: 2px solid #ffcf46;
                    background: #fff;
                    margin-bottom: 13px;" >
                       
                    </p>

                    <div fxLayout="row wrap " fxFlex="100">
                    
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" >
                        <input matInput placeholder="Question Paper Title" name="questionPaperTitle" formControlName="questionPaperTitle" required>
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25" >
                        <input matInput placeholder="Question Paper Code" name="questionPaperCode" formControlName="questionPaperCode" required>
                    </mat-form-field>
                    
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                        <input matInput placeholder="Set Number" name="setNumber" formControlName="setNumber" required>
                    </mat-form-field>


                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="100" fxFlex.gt-md="33">
                        <input matInput placeholder="Total Questions" name="totalQuestions" formControlName="totalQuestions" required>
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput placeholder="Total Marks" name="totalMarks" formControlName="totalMarks" required>
                    </mat-form-field>
             
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                        <input matInput placeholder="Pass Marks" name="passMarks" formControlName="passMarks" required>
                    </mat-form-field>

                    
                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="33">
                        <mat-select placeholder="Prepared Employee" name="preparedByEmpId" formControlName="preparedByEmpId">
                            <mat-option  [value]="employeeId">{{uName}}</mat-option>
                         </mat-select>
                    </mat-form-field>

                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="33">
                        <input matInput [matDatepicker]="preparedDate" name="preparedDate" formControlName="preparedDate" placeholder="Prepared Date">
                        <mat-datepicker-toggle matSuffix [for]="preparedDate"></mat-datepicker-toggle>
                        <mat-datepicker #preparedDate></mat-datepicker>
                    </mat-form-field>


                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="30" >
                        <mat-select placeholder="Question Paper" name="questionPaperStatusCatDetId" formControlName="questionPaperStatusCatDetId">
                            <mat-option *ngFor="let status of questionPaperStatusDuplicate" [value]="status.generalDetailId">{{status.generalDetailDisplayName}}</mat-option>
                         </mat-select>
                    </mat-form-field>


                    <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="75" fxFlex.gt-md="75">
                        <textarea matInput placeholder="Status Comments" name="statusComments" formControlName="statusComments" required></textarea>
                    </mat-form-field>

                

                    <!-- <section fxLayout="column"  fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25" >
                        <label>
                     <input type="checkbox" (change)="onSupplyExamChange($event.target.checked)">  &nbsp; &nbsp;  <span>Is Supply Exam</span>

                        </label>

                       
                        

                    </section> -->

                   
                    
                    <br>


           


                      

                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="" fxFlex.gt-md="25" >
                            <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                        </section>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="50" *ngIf="addquestionpaperForm.controls.isActive.value === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                </div>
                   </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
               Save
               </button>

            </mat-dialog-actions>
        </form>
    </div>
</div>
