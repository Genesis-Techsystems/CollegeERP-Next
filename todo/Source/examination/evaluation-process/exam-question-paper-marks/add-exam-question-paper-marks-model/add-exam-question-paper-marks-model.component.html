<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>  {{dialogTitle}}  </span>
                </div>
            </div>
        </div>
        <form name="addquestionpaperMarksForm" [formGroup]="addquestionpaperMarksForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50">
                            <mat-select placeholder="Exam Question Paper" name="ExamQuestionpaperId" formControlName="ExamQuestionpaperId" required>
                                <mat-option *ngFor="let questionpaper of questionpapers" [value]="questionpaper.ExamQuestionpaperId">{{questionpaper.ExamQuestionpaperId}}</mat-option>
                            </mat-select>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25" >
                            <input matInput placeholder="Question Number" name="QuetionNumber" formControlName="QuetionNumber" required>
                        </mat-form-field>
                        
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <input matInput placeholder="Question Code" name="QuestonCode" formControlName="QuestonCode" required>
                        </mat-form-field>
                 
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="75" fxFlex.gt-md="75">
                            <textarea matInput placeholder="Question" name="Question" formControlName="Question" required></textarea>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <input matInput placeholder="Question Marks" name="QuestionMarks" formControlName="QuestionMarks" required>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="75" fxFlex.gt-md="75">
                            <textarea matInput placeholder="Model Answer" name="ModelAnswer1" formControlName="ModelAnswer1" required></textarea>
                        </mat-form-field>
                        
                        <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Model Answer 2" name="ModelAnswer2" formControlName="ModelAnswer2" required>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Model Answer 3" name="ModelAnswer3" formControlName="ModelAnswer3" required>
                        </mat-form-field> -->
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="25" fxFlex.gt-md="25">
                            <mat-select placeholder="Sub units" name="SubunitsId" formControlName="SubunitsId" required>
                                <mat-option *ngFor="let subunit of subunits" [value]="subunit.SubunitsId">{{subunit.SubunitsId}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>
                    <!-- <div fxLayout="row wrap " fxFlex="100">
                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                            <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                        </section>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="addquestionpaperMarksForm.controls.isActive.value === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                    </div> -->
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
               Save
               </button>

            </mat-dialog-actions>
        </form>
    </div>
</div>
