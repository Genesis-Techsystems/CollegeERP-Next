<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>  {{dialogTitle}}  </span>
                </div>
            </div>
        </div>
        <form name="addquestionpaperGroupsForm" [formGroup]="addquestionpaperGroupsForm" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="33">
                            <mat-select placeholder="Exam Question Paper" name="questionPaperId" formControlName="questionPaperId" required>
                                <mat-option *ngFor="let questionpaper of questionpapers" [value]="questionpaper.questionPaperId">{{questionpaper.questionPaperId}}</mat-option>
                            </mat-select>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                            <input matInput placeholder="Question Group Name" name="quetionGroupName" formControlName="quetionGroupName" required>
                        </mat-form-field>
                        
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="33">
                            <mat-select placeholder="Question Paper Marks" name="questionPaperMarksId" formControlName="questionPaperMarksId" required>
                                <mat-option *ngFor="let questionpapermark of questionpapermarks" [value]="questionpapermark.questionPaperMarksId">{{questionpaper.questionPaperMarksId}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                 
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Best Of Answers" name="bestOfAnswers" formControlName="bestOfAnswers" required>
                        </mat-form-field>

                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Is Single Group" name="isSingleGroup" formControlName="isSingleGroup" required>
                        </mat-form-field>
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="25">
                            <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                        </section>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="50" fxFlex.gt-md="50" *ngIf="addquestionpaperGroupsForm.controls.isActive.value === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                    </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
               Save
               </button>

            </mat-dialog-actions>
        </form>
    </div>
</div>
