<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div fxLayout="row wrap " fxFlex="100" fxLayoutAlign="space-between center">
                <div fxLayoutAlign="start center" class="mod-head">
                    <mat-icon>settings</mat-icon>
                    <span>{{dialogTitle}} &nbsp;- &nbsp;{{data?.evaluatorName}}</span>
                </div>
                <div fxLayoutAlign="end center" class="mod-head">

                </div>
            </div>
        </div>
        <form name="addevaluatorform" [formGroup]="addevaluatorform" novalidate>
            <mat-dialog-content>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100">
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <mat-select placeholder="Course" name="courseId" formControlName="courseId"
                                (selectionChange)="selectedCourse(addevaluatorform.value.courseId)" required>
                                <mat-option *ngFor="let course of courses"
                                    [value]="course.courseId">{{course.courseCode}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <mat-select placeholder="Regulation" name="regulationId" formControlName="regulationId"
                                required>
                                <mat-option *ngFor="let regulation of regulations"
                                    [value]="regulation.regulationId">{{regulation.regulationName}}</mat-option>
                            </mat-select>
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="40" fxFlex.gt-md="40">
                            <mat-select placeholder="Subjects" formControlName="subjectId" multiple>
                                <ngx-mat-select-search (keyup)="searchdata($event.target.value)"
                                    [placeholderLabel]="'Search...'" [noEntriesFoundLabel]="'no matching data found'">
                                </ngx-mat-select-search>
                                <mat-option *ngFor="let subject of subjectsData" [value]="subject.subjectId"
                                    matTooltip="{{subject.subjectName}}({{subject.subjectCode}})">
                                    {{ subject.subjectName }}
                                    <span style="color:blue"> ({{subject.subjectCode}}) </span>
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <button mat-raised-button class="add-btn" (click)="addPreference()"
                                color="accent">Add</button>
                        </div>
                    </div>
                </div>
            </mat-dialog-content>
            <div class="mat-elevation-z8 " *ngIf="evaluatorPrefences && evaluatorPrefences.length > 0">
                <div class="example-container" style="overflow-x: auto; overflow-y: auto; height: 210px;">
                    <table mat-table [dataSource]="dataSource" matSort>

                        <ng-container matColumnDef="course">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Course</th>
                            <td mat-cell *matCellDef="let row"> {{row?.courseCode}} </td>
                        </ng-container>

                        <ng-container matColumnDef="regulation">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Regulation</th>
                            <td mat-cell *matCellDef="let row"> {{row?.regulationCode}} </td>
                        </ng-container>

                        <ng-container matColumnDef="subjects">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Subject</th>
                            <td mat-cell *matCellDef="let row"> {{row?.subjectCode}} </td>
                        </ng-container>

                        <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Actions</th>
                            <td mat-cell *matCellDef="let row;">
                                <i class="fa fa-times edit" (click)="deleteRow(row)"></i>
                            </td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;">
                        </tr>
                    </table>
                </div>
            </div>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                    Close
                </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
                    Save
                </button>
            </mat-dialog-actions>
        </form>
    </div>
</div>
