<div class="add-form">
    <div class="content">
        <div fxLayout="column" class="header-background" fxLayoutAlign="start" fxLayout.gt-md="row">
            <div class="mr-24" fxLayout="column" fxLayoutAlign="start" fxFlex="1 0 auto">
                <div fxLayoutAlign="start center" class="mod-head">
                    <i class="material-icons icon-align ">
                              ballot
                              </i>
                    <span>  {{dialogTitle}}  </span>
                </div>
            </div>
        </div>
       
        <form name="addaddevaluatorform" [formGroup]="addevaluatorform" novalidate>
            <mat-dialog-content>
                <div fxLayout="column" class="div-border">
                    <div fxLayout="row wrap " fxFlex="100">
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <p class="details-off">Evalutor  </p>
                        </div>
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                            <p class="details-off"> : <span class="colr"> {{data?.evaluatorName}}</span></p>
                        </div>
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <p class="details-off">Role</p>
                        </div>
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                            <p class="details-off"> : <span class="colr"> {{data?.roleName}}</span></p>
                        </div>
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                      <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                          <p class="details-off">Mobile </p>
                      </div>
                      <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80"  *ngIf="data?.phoneNumber">
                          <p class="details-off"> : <span class="colr"> {{data?.phoneNumber}} </span></p>
                      </div>
                      <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80" *ngIf="!data?.phoneNumber">
                        <p class="details-off"> : <span class="colr"  > {{data[0]?.phone}} </span></p>
                    </div>
                    </div>
                    <!-- <div fxLayout="row wrap " fxFlex="100">
                      <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                          <p class="details-off">Student : </p>
                      </div>
                      <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="80" fxFlex.gt-md="80">
                          <p class="details-off"><span class="colr"> {{data.firstName}} ({{data.rollNo}}) </span></p>
                      </div>
                    </div> -->
                </div>
                 <div fxLayout="column" style="margin-top: 1% !important;">
                    <div fxLayout="row wrap " fxFlex="100">
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                            <input matInput placeholder="Bank Name" name="bankName" formControlName="bankName">
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33" >
                            <input matInput placeholder="Branch Name" name="branchName" formControlName="branchName">
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Account Number" name="accountNumber" formControlName="accountNumber">
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Ifsc Code" name="ifscCode" formControlName="ifscCode">
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Bank Address" name="bankAddress" formControlName="bankAddress">
                        </mat-form-field>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Phone no" name="Phone" formControlName="phone">
                        </mat-form-field>
                        <!-- <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Dd Payable Address" name="ddPayableAddress" formControlName="ddPayableAddress">
                        </mat-form-field> -->
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                            <input matInput placeholder="Upi" name="upi" formControlName="upi">
                        </mat-form-field>
                    </div>
                    <div fxLayout="row wrap " fxFlex="100">
                        <section fxLayout="column" class="mp-24 mb-24 p-8" fxFlex="100" fxFlex.gt-xs="20" fxFlex.gt-md="20">
                            <mat-checkbox name="isActive" formControlName="isActive">Active</mat-checkbox>
                        </section>
                        <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="45" fxFlex.gt-md="45" *ngIf="addevaluatorform.controls.isActive.value === false">
                            <input matInput placeholder="Reason" name="reason" formControlName="reason">
                        </mat-form-field>
                    </div>
                </div>
            </mat-dialog-content>
            <mat-dialog-actions>
                <button mat-raised-button class="cls-btn" mat-dialog-close>
                          Close
                          </button>
                <button mat-raised-button class="add-btn" color="accent" (click)="submit()">
               Save
               </button>
 
            </mat-dialog-actions>
        </form>
    </div>
</div>
