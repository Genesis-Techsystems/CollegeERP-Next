<div id="admission-dashboard" class="page-layout simple">

    <div class="header pd-dash pb-0" fxLayout="column" fxLayoutAlign="space-between">

        <div fxLayout="column" class="link-header" fxLayoutAlign="center center" fxLayout.gt-xs="column" fxLayoutAlign.gt-xs="center start">
            <div class="black-fg" fxLayout="row" fxLayoutAlign="start center">
                <mat-icon class="secondary-text s-18 cursr" [routerLink]="'/dashboard'">home</mat-icon>
                <mat-icon class="secondary-text s-16">chevron_right</mat-icon>
                <span class="secondary-text">Evaluation-Process</span>
                <mat-icon class="secondary-text s-16">chevron_right</mat-icon>
                <span>Exam-Question-Paper-Marks</span>
                <mat-icon class="secondary-text s-16">chevron_right</mat-icon>
                <span>Question Bank</span>
            </div>
        </div>

    </div>

    <!-- CONTENT -->
    <div class="content pd-card mt-15">

        <div class="mat-elevation-z8 bkgrd">
            <form name="firstFormGroup" [formGroup]="firstFormGroup" class="form-pad" novalidate>
                <div fxLayout="row" fxLayoutAlign="start center" class="sub-header">
                    <i class="material-icons sub-header-icon">computer</i>
                    <span class="sub-header-text"> Question Bank 
                    </span>         
                       <span style="color: blue; font-size: 13px;"><strong>&nbsp;({{params.questionpaper_title}})</strong></span>

                </div>
                <div style="border: 1px solid #dedede;
                padding: 0 10px;">
                <div fxLayout="column" style="margin-top: 10px" class="mb-15 inner-bkgrd1">
                    <h4 class="form-sub-header">Add Questions in '{{params.questionpaper_title}}'</h4>
                </div>
                <div fxLayout="column">
                    <div fxLayout="row wrap " fxFlex="100" style="position: relative;">
                        <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="30" fxFlex.gt-md="30">
                            <mat-form-field fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="33" fxFlex.gt-md="33">
                                <mat-select placeholder="Select Question Bank" name="assessmentId" formControlName="assessmentId" (selectionChange)="selectedQuestionBank(firstFormGroup.value.assessmentId)">
                                    <mat-option *ngFor="let qb of QuestionBanks" [value]="qb.assessmentId">{{qb.assessmentName}}</mat-option>
                                </mat-select>
                            </mat-form-field>
                            
                        </div>
                    </div>
                </div>

                <div fxLayout="column" style="margin: 0 18px 18px 18px;" *ngIf="questionList.length > 0">
                    <!-- <p style="    font-weight: 600;
                    font-size: 16px;
                    color: blue;" *ngIf="questionList.length > 0">Question List</p> -->
                     <p style="    font-size: 19px;
                     font-weight: 600;
                     padding: 8px 13px;
                     margin: 0;
                     border-bottom: 2px solid #ffcf46;
                     background: #fff;" *ngIf="questionList.length > 0">
                        List of <span style="color: blue;"> Questions </span> 
                     </p>
                    <mat-accordion style="width: 100%;padding: 1px" >
                        <mat-expansion-panel *ngFor="let qu of questionList" [expanded]="step === 0" >
                            <mat-expansion-panel-header>
                                <mat-panel-title>
                                    <div fxLayout="column" fxLayoutAlign="center center" fxLayout.gt-xs="column" fxLayoutAlign.gt-xs="center start">
                                        <div class="black-fg" fxLayout="row" fxLayoutAlign="start center">
                                            <input type="radio" name="check" [(ngModel)]="qu.check" (change)="checkInput(qu)" ngModelOptions="{standalone: true}">
                                            <!-- <mat-icon class="secondary-text icon-align">live_help</mat-icon> -->
                                            <strong class="table-heads" style="font-size: 16px !important;" *ngIf="qu.courseQuestionDTO && qu.courseQuestionDTO.question !=null" [innerHtml]="qu.courseQuestionDTO.question"> </strong>
                                            <span style="font-weight: 600;
                                                    margin-left: 5px;">({{qu.courseQuestionDTO.marks}} marks)</span>
                                                    

                                                    
                                            
                                        </div>
                                    </div>
                                </mat-panel-title>
                            </mat-expansion-panel-header>
                            <div fxLayout="row" class="row-align" style="position: relative;">
                                <div fxLayout="column" class="p-8" fxFlex="100" fxFlex.gt-xs="75" fxFlex.gt-md="75" >
                                    <!-- <p *ngFor="let opt of qu.courseQuestionDTO.courseQuestionOptionDTOs">
                                        <img style="    width: 2%;
                                        height: 20px;
                                        position: absolute;
                                        left: -6px;
                                        top: 3px;" src="assets/images/avatars/green-tick.png" *ngIf="opt.isCorrectAnswer"> 
                                        <span style="color: blue;font-weight: 600;" [innerHtml]="opt.options"></span>
                                    </p> -->
                                    <ul style="padding: 0 30px;
                                    margin: 0;">
                                    <li *ngFor="let opt of qu.courseQuestionDTO.courseQuestionOptionDTOs" [ngClass]="{'crtAnsw': opt.isCorrectAnswer=== true}"
                                    >
                                        <!-- <img style="    width: 3%;
                                        height: 20px;
                                        position: absolute;
                                        left: -6px;
                                        top: 3px;" src="assets/images/avatars/green-tick.png" *ngIf="opt.isCorrectAnswer">  -->
                                        <span style="font-weight: 600;" [innerHtml]="opt.options" ></span>
                                    </li>
                                </ul>
                                </div>
                            </div>
    
                        </mat-expansion-panel>
    
                        <mat-expansion-panel (opened)="panelOpenState = true" (closed)="panelOpenState = false">
                        </mat-expansion-panel>
                    </mat-accordion>
                </div>
                
            </div>
                <div class="form-btn">
                    <button mat-raised-button class="add-btn" style="width: auto !important;" color="accent" (click)="addQuestionsList()">
                      Add
                  </button>
                </div>
                <div class="save-btn-align">
                    <button mat-raised-button class="add-btn back-btn" (click)="goBack()">Back</button>
                </div>
            </form>
        </div>

    </div>
    <!-- / CONTENT -->

</div>
