# Apache vhost for the Next.js College ERP deployment on dev.skolo.in.
# Place at: /etc/httpd/conf.d/dev-next.conf
# Backs the pm2 app `skolo-next` listening on 127.0.0.1:3100.
#
# Prereqs (run as root):
#   1. DNS: create A/CNAME record `dev-next.skolo.in` -> this host's public IP.
#   2. Firewall: ports 80/443 already open (httpd is running). Nothing else needed.
#   3. TLS cert (after DNS resolves):
#        certbot --apache -d dev-next.skolo.in
#      Certbot will rewrite this file in-place to add SSLCertificateFile lines
#      and enable the :443 vhost. Or use the manual block below.
#   4. Reload: `systemctl reload httpd` (or `apachectl -t && systemctl reload httpd`)

<VirtualHost *:80>
    ServerName dev-next.skolo.in

    # Redirect everything to HTTPS once the cert is issued.
    # Until then, comment the rewrite block and uncomment the ProxyPass below
    # so you can hit http://dev-next.skolo.in/ during cert provisioning.
    RewriteEngine On
    RewriteCond %{SERVER_NAME} =dev-next.skolo.in
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

    # ProxyPreserveHost On
    # ProxyPass        / http://127.0.0.1:3100/
    # ProxyPassReverse / http://127.0.0.1:3100/

    CustomLog /var/log/httpd/dev-next.skolo.in-access.log combined
    ErrorLog  /var/log/httpd/dev-next.skolo.in-error.log
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName dev-next.skolo.in

    # --- proxy to Next.js (pm2: skolo-next on :3100) ---
    ProxyPreserveHost On
    ProxyRequests     Off
    ProxyTimeout      60

    # Forward real client info so iron-session sees a Secure request and
    # Next.js generates correct absolute URLs.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    ProxyPass        / http://127.0.0.1:3100/  retry=0
    ProxyPassReverse / http://127.0.0.1:3100/

    # --- TLS (certbot will fill these in) ---
    SSLCertificateFile    /etc/letsencrypt/live/dev-next.skolo.in/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dev-next.skolo.in/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    CustomLog /var/log/httpd/dev-next.skolo.in-access.log combined
    ErrorLog  /var/log/httpd/dev-next.skolo.in-error.log
</VirtualHost>
</IfModule>
